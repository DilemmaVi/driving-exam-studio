appId: com.driving-exam-studio.app
productName: "驾考视频工作室"
directories:
  output: dist-electron
npmRebuild: false
files:
  - "electron/**/*"
extraResources:
  - from: "packed-standalone"
    to: "standalone"
    filter:
      - "**/*"
  - from: "data"
    to: "data"
    filter:
      - "exam.db"
  - from: "resources/node"
    to: "node"
win:
  target:
    - nsis
  icon: "public/logo.png"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
asar: false
