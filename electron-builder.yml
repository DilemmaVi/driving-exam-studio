appId: com.driving-exam-studio.app
productName: "驾考视频工作室"
artifactName: "driving-exam-studio-setup-${version}.${ext}"
directories:
  output: dist-electron
npmRebuild: false
files:
  - "electron/**/*"
  - "!node_modules"
extraResources:
  - from: "packed-standalone"
    to: "standalone"
    filter:
      - "**/*"
  - from: "data"
    to: "data"
    filter:
      - "exam.db"
  - from: "resources/node"
    to: "node"
win:
  target:
    - nsis
  icon: "public/logo.png"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
asar: false
publish:
  - provider: generic
    url: https://file.yxjky.com/studio-releases/
  - provider: github
    owner: DilemmaVi
    repo: driving-exam-studio
    releaseType: release
