name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Download Node.js portable for bundling
        shell: pwsh
        run: |
          $nodeVersion = "v20.18.3"
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node-extract
          New-Item -ItemType Directory -Force -Path resources/node
          Copy-Item "node-extract/node-$nodeVersion-win-x64/node.exe" "resources/node/node.exe"

      - name: Prepare standalone package
        shell: pwsh
        run: |
          Copy-Item -Recurse .next/standalone packed-standalone
          # Rename node_modules to node_deps to bypass electron-builder filtering
          Rename-Item packed-standalone/node_modules node_deps
          # Merge full node_modules into node_deps (standalone only has partial server deps)
          Get-ChildItem node_modules -Directory | ForEach-Object {
            $dst = "packed-standalone/node_deps/$($_.Name)"
            if (!(Test-Path $dst)) {
              Copy-Item -Recurse $_.FullName $dst
            } else {
              Copy-Item -Recurse -Force "$($_.FullName)\*" $dst
            }
          }
          Copy-Item -Recurse .next/static packed-standalone/.next/static
          Copy-Item -Recurse public packed-standalone/public
          Copy-Item -Recurse scripts packed-standalone/scripts
          # Compile render-video.ts to JS for production use
          npx esbuild scripts/render-video.ts --bundle --platform=node --outfile=packed-standalone/scripts/render-video.js --packages=external
          # Bundle electron main.js with electron-updater included
          npx esbuild electron/main.js --bundle --platform=node --outfile=electron/main.bundle.js --external:electron
          Move-Item -Force electron/main.bundle.js electron/main.js
          New-Item -ItemType Directory -Force -Path packed-standalone/src
          Copy-Item -Recurse src/remotion packed-standalone/src/remotion
          # Verify
          Write-Host "=== packed-standalone contents ==="
          Get-ChildItem packed-standalone -Depth 0

      - name: Build Electron app (no publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Smoke test packaged app
        shell: pwsh
        run: |
          $nodeBin = "dist-electron/win-unpacked/resources/node/node.exe"
          $standalone = "dist-electron/win-unpacked/resources/standalone"
          $nodeDeps = "$standalone/node_deps"

          Write-Host "=== Verify node.exe exists ==="
          if (!(Test-Path $nodeBin)) { throw "node.exe not found" }

          Write-Host "=== Verify node_deps exists ==="
          if (!(Test-Path $nodeDeps)) { throw "node_deps not found" }

          Write-Host "=== Test module resolution (critical packages) ==="
          $env:NODE_PATH = $nodeDeps
          $testScript = @"
          const mods = [
            '@remotion/bundler',
            '@remotion/renderer',
            'react',
            'react-dom',
            'react-dom/client',
            'webpack',
            'better-sqlite3'
          ];
          const failed = [];
          for (const m of mods) {
            try { require.resolve(m); }
            catch (e) { failed.push(m + ': ' + e.message); }
          }
          if (failed.length > 0) {
            console.error('Failed to resolve:\\n' + failed.join('\\n'));
            process.exit(1);
          }
          console.log('All ' + mods.length + ' modules resolved OK');
          "@
          & $nodeBin -e $testScript
          if ($LASTEXITCODE -ne 0) { throw "Module resolution test failed" }

          Write-Host "=== Test render script can be loaded ==="
          $renderScript = Resolve-Path "$standalone/scripts/render-video.js"
          if (!(Test-Path $renderScript)) { throw "render-video.js not found" }
          Write-Host "render-video.js exists at $renderScript"

          Write-Host "=== Verify electron main.js is bundled ==="
          $mainJs = "dist-electron/win-unpacked/resources/app/electron/main.js"
          if (!(Test-Path $mainJs)) { throw "electron/main.js not found in app" }
          $content = Get-Content $mainJs -Raw
          if ($content -match "electron-updater") { Write-Host "electron-updater is bundled in main.js" }
          else { throw "electron-updater NOT found in bundled main.js" }

          Write-Host "=== Smoke test PASSED ==="

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload to Aliyun OSS (overwrite latest)
        shell: pwsh
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          $ossPrefix = "studio-releases"

          # Safety checks - abort if any env is empty
          if (!$env:OSS_BUCKET) { throw "OSS_BUCKET is empty, aborting" }
          if (!$env:OSS_ACCESS_KEY_ID) { throw "OSS_ACCESS_KEY_ID is empty, aborting" }

          # Install aliyun CLI
          Invoke-WebRequest -Uri "https://aliyuncli.alicdn.com/aliyun-cli-windows-latest-amd64.zip" -OutFile aliyun-cli.zip
          Expand-Archive aliyun-cli.zip -DestinationPath aliyun-cli
          $env:Path += ";$PWD\aliyun-cli"

          # Configure aliyun CLI
          aliyun configure set --profile default --mode AK --access-key-id $env:OSS_ACCESS_KEY_ID --access-key-secret $env:OSS_ACCESS_KEY_SECRET --region $env:OSS_REGION

          # List existing files in studio-releases/ and delete only .exe and .blockmap (large files)
          # latest.yml is small and will be overwritten anyway
          Write-Host "=== Cleaning old installer files ==="
          $listing = aliyun oss ls "oss://$env:OSS_BUCKET/$ossPrefix/" 2>&1
          $oldFiles = ($listing | Select-String -Pattern "$ossPrefix/.*\.(exe|blockmap)$" -AllMatches).Matches.Value
          foreach ($old in $oldFiles) {
            if ($old) {
              Write-Host "Removing old file: $old"
              aliyun oss rm "oss://$env:OSS_BUCKET/$old" --force
            }
          }

          # Upload new release files
          $files = Get-ChildItem dist-electron\* -Include *.exe,*.yml,*.blockmap
          if ($files.Count -eq 0) { throw "No release files found in dist-electron/" }
          foreach ($f in $files) {
            Write-Host "Uploading $($f.Name) to oss://$env:OSS_BUCKET/$ossPrefix/$($f.Name)"
            aliyun oss cp $f.FullName "oss://$env:OSS_BUCKET/$ossPrefix/$($f.Name)" --force
          }
          Write-Host "=== OSS upload complete ==="

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist-electron/*.exe
            dist-electron/*.yml
            dist-electron/*.blockmap
          retention-days: 3
