name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Download Node.js portable for bundling
        shell: pwsh
        run: |
          $nodeVersion = "v20.18.3"
          $url = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath node-extract
          New-Item -ItemType Directory -Force -Path resources/node
          Copy-Item "node-extract/node-$nodeVersion-win-x64/node.exe" "resources/node/node.exe"

      - name: Prepare standalone package
        shell: pwsh
        run: |
          Copy-Item -Recurse .next/standalone packed-standalone
          # Rename node_modules to avoid electron-builder filtering it
          Rename-Item packed-standalone/node_modules node_deps
          Copy-Item -Recurse .next/static packed-standalone/.next/static
          Copy-Item -Recurse public packed-standalone/public
          Copy-Item -Recurse scripts packed-standalone/scripts
          New-Item -ItemType Directory -Force -Path packed-standalone/src
          Copy-Item -Recurse src/remotion packed-standalone/src/remotion
          # Verify
          Write-Host "=== packed-standalone contents ==="
          Get-ChildItem packed-standalone -Depth 0
          Write-Host "=== node_deps exists ==="
          Test-Path packed-standalone/node_deps

      - name: Build Electron app
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
